name: Update cycling data

on:
  # 18:00 UTC = 20:00 CEST (summer Germany). In winter (CET) this is 19:00 local.
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      prompt:
        description: Optional prompt override (default loads prompts/update-giro-2026.md)
        required: false
        default: ""

jobs:
  check-active-races:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check index.json for active races
        id: check
        run: |
          should_run="$(bash scripts/should-run-agent.sh)"
          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"
          if [[ "${should_run}" == "true" ]]; then
            echo "At least one race is not finished — agent will run."
          else
            echo "All races are finished (or index empty) — scheduled run will be skipped."
          fi

  update-giro-data:
    needs: check-active-races
    if: needs.check-active-races.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cursor agent (local)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENT_PROMPT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prompt || '' }}
          AGENT_LOG_LEVEL: info
        run: npm run agent

      - name: Publish data changes as pull request
        env:
          BOT_BRANCH: bot/giro-d-italia-2026
          # GH_PR_TOKEN (optional PAT) when the repo disallows GITHUB_TOKEN from creating PRs.
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/publish-data-pr.sh
