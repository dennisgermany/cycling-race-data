name: Update race metadata

on:
  workflow_dispatch:
    inputs:
      race_name:
        description: "Display name, e.g. Tour de France"
        required: true
        type: string

jobs:
  update-race-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve race identifiers
        id: ids
        env:
          RACE_NAME: ${{ inputs.race_name }}
        run: |
          YEAR="$(date -u +%Y)"
          IDS="$(node scripts/race-ids.mjs "$RACE_NAME" "$YEAR")"
          SLUG="$(echo "$IDS" | jq -r .slug)"
          BOT_BRANCH="$(echo "$IDS" | jq -r .botMetaBranch)"
          echo "year=${YEAR}" >> "${GITHUB_OUTPUT}"
          echo "slug=${SLUG}" >> "${GITHUB_OUTPUT}"
          echo "bot_branch=${BOT_BRANCH}" >> "${GITHUB_OUTPUT}"

      - name: Build agent prompt
        env:
          RACE_NAME: ${{ inputs.race_name }}
        run: |
          node scripts/expand-update-race-metadata-prompt.mjs "$RACE_NAME" "${{ steps.ids.outputs.year }}" -o /tmp/update-race-metadata-prompt.md

      - name: Run Cursor agent (local)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENT_PROMPT_FILE: /tmp/update-race-metadata-prompt.md
          AGENT_LOG_LEVEL: info
        run: npm run agent

      - name: Publish metadata updates as pull request
        env:
          BOT_BRANCH: ${{ steps.ids.outputs.bot_branch }}
          PR_TITLE: "Update ${{ inputs.race_name }} ${{ steps.ids.outputs.year }} race metadata"
          COMMIT_MSG: "chore(data): update ${{ steps.ids.outputs.slug }} ${{ steps.ids.outputs.year }} race metadata"
          PR_BODY: |
            ## Summary

            Metadata follow-up for **${{ inputs.race_name }}** (${{ steps.ids.outputs.year }}) under `data/${{ steps.ids.outputs.year }}/${{ steps.ids.outputs.slug }}/`.

            May include start list backfill, route features (climbs/sprints/cobbles), stage metadata corrections, classifications, and missing GPX. Does **not** update results or stage finish status.

            ## Test plan

            - [ ] Confirm start list matches official sources (or still empty with `startlistNotes`)
            - [ ] Spot-check route features against stage profiles
            - [ ] Confirm no accidental edits to `results.json` / `gc/` / classification snapshots
            - [ ] Confirm `data/index.json` still consistent

            **Manual merge required** — review before merging.
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/publish-create-race-pr.sh
