name: Create race

on:
  workflow_dispatch:
    inputs:
      race_name:
        description: "Display name, e.g. Tour de France"
        required: true
        type: string

jobs:
  create-race:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve race identifiers
        id: ids
        env:
          RACE_NAME: ${{ inputs.race_name }}
        run: |
          YEAR="$(date -u +%Y)"
          IDS="$(node scripts/race-ids.mjs "$RACE_NAME" "$YEAR")"
          SLUG="$(echo "$IDS" | jq -r .slug)"
          BOT_BRANCH="$(echo "$IDS" | jq -r .botBranch)"
          echo "year=${YEAR}" >> "${GITHUB_OUTPUT}"
          echo "slug=${SLUG}" >> "${GITHUB_OUTPUT}"
          echo "bot_branch=${BOT_BRANCH}" >> "${GITHUB_OUTPUT}"

      - name: Build agent prompt
        env:
          RACE_NAME: ${{ inputs.race_name }}
        run: |
          node scripts/expand-create-race-prompt.mjs "$RACE_NAME" "${{ steps.ids.outputs.year }}" -o /tmp/create-race-prompt.md

      - name: Run Cursor agent (local)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENT_PROMPT_FILE: /tmp/create-race-prompt.md
          AGENT_LOG_LEVEL: info
        run: npm run agent

      - name: Publish race scaffold as pull request
        env:
          BOT_BRANCH: ${{ steps.ids.outputs.bot_branch }}
          PR_TITLE: "Add ${{ inputs.race_name }} ${{ steps.ids.outputs.year }} race data"
          COMMIT_MSG: "feat(data): add ${{ steps.ids.outputs.slug }} ${{ steps.ids.outputs.year }} race scaffold"
          PR_BODY: |
            ## Summary

            Automated scaffold for **${{ inputs.race_name }}** (${{ steps.ids.outputs.year }}) under `data/${{ steps.ids.outputs.year }}/${{ steps.ids.outputs.slug }}/`.

            Includes stages, teams, profile climbs, route features, GPX (where available), and empty results stubs.

            ## Test plan

            - [ ] Verify stage dates, distances, and start/finish against official route
            - [ ] Confirm team names and bibs match official start list
            - [ ] Spot-check GPX files and profile climbs
            - [ ] Confirm `data/index.json` entry and derived race status

            **Manual merge required** — review before merging.
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/publish-create-race-pr.sh
