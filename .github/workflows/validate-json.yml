name: Validate data JSON

on:
  push:
    branches: [main]
    paths: ["data/**"]
  pull_request:
    paths: ["data/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JSON files
        run: node scripts/validate-json.mjs
