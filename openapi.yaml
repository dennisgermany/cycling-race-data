openapi: 3.1.0
info:
  title: Cycling Race Data API
  description: |
    Read-only REST API for professional cycling race data. All endpoints are static JSON
    (or GPX) files served from GitHub Pages. There is no write API.

    **Client-side lookups:** filter `stages.json` by stage id, or read
    `results.json` → `stageResults["stage-1"]` for per-stage results.
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: https://{owner}.github.io/cycling-race-data
    description: GitHub Pages (replace `{owner}` with the repository owner)
    variables:
      owner:
        default: YOUR_GITHUB_OWNER

tags:
  - name: Races
    description: Race catalog
  - name: Stages
    description: Stage list and metadata
  - name: Teams
    description: Start lists
  - name: Results
    description: Stage results and provisional GC
  - name: GC
    description: General classification snapshots
  - name: Classifications
    description: Jersey metadata and points/mountains/young-rider classification snapshots
  - name: Route
    description: Climbs and GPX routes

paths:
  /data/index.json:
    get:
      tags: [Races]
      summary: List races
      description: Race catalog with aggregated status per race.
      operationId: listRaces
      responses:
        "200":
          description: Race catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaceIndex"

  /data/{year}/{slug}/stages.json:
    get:
      tags: [Stages]
      summary: List stages
      operationId: listStages
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
      responses:
        "200":
          description: All stages for the race
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stage"
        "404":
          $ref: "#/components/responses/NotFound"

  /data/{year}/{slug}/teams.json:
    get:
      tags: [Teams]
      summary: List teams
      operationId: listTeams
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
      responses:
        "200":
          description: Start list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/NotFound"

  /data/{year}/{slug}/results.json:
    get:
      tags: [Results]
      summary: Stage results and provisional GC
      operationId: getResults
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
      responses:
        "200":
          description: Provisional GC and per-stage top-25 results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Results"
        "404":
          $ref: "#/components/responses/NotFound"

  /data/{year}/{slug}/gc/after-stage-{stageNumber}.json:
    get:
      tags: [GC]
      summary: GC after stage N
      operationId: getGcAfterStage
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
        - name: stageNumber
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: Stage number (1-based)
      responses:
        "200":
          description: Top 25 riders in GC after the given stage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiderResult"
        "404":
          description: File not found (stage not finished or not yet published)

  /data/{year}/{slug}/classifications.json:
    get:
      tags: [Classifications]
      summary: Classification metadata (jersey colors/names)
      description: |
        Ordered list of the classifications this race awards, with race-specific
        jersey colors and names. Optional: absent for one-day races (GC only).
      operationId: getClassifications
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
      responses:
        "200":
          description: Ordered classifications with jersey metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Classification"
        "404":
          $ref: "#/components/responses/NotFound"

  /data/{year}/{slug}/points/after-stage-{stageNumber}.json:
    get:
      tags: [Classifications]
      summary: Points classification after stage N
      operationId: getPointsAfterStage
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
        - $ref: "#/components/parameters/stageNumber"
      responses:
        "200":
          description: Top 25 riders in the points classification after the given stage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassificationPointsResult"
        "404":
          description: File not found (stage not finished or not yet published)

  /data/{year}/{slug}/kom/after-stage-{stageNumber}.json:
    get:
      tags: [Classifications]
      summary: Mountains (KOM) classification after stage N
      operationId: getKomAfterStage
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
        - $ref: "#/components/parameters/stageNumber"
      responses:
        "200":
          description: Top 25 riders in the mountains classification after the given stage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassificationPointsResult"
        "404":
          description: File not found (stage not finished or not yet published)

  /data/{year}/{slug}/youth/after-stage-{stageNumber}.json:
    get:
      tags: [Classifications]
      summary: Young rider classification after stage N
      operationId: getYouthAfterStage
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
        - $ref: "#/components/parameters/stageNumber"
      responses:
        "200":
          description: Top 25 riders in the young rider classification after the given stage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiderResult"
        "404":
          description: File not found (stage not finished or not yet published)

  /data/{year}/{slug}/route-features.json:
    get:
      tags: [Route]
      summary: Route features by stage id
      operationId: getRouteFeatures
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
      responses:
        "200":
          description: >
            Climbs, intermediate sprints, and cobbles keyed by stage id
            (e.g. `stage-1`). Sorted by `distanceKm` ascending within each stage.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: "#/components/schemas/RouteFeature"
        "404":
          $ref: "#/components/responses/NotFound"

  /data/{year}/{slug}/gpx/stage-{stageNumber}-route.gpx:
    get:
      tags: [Route]
      summary: Stage route GPX
      operationId: getStageGpx
      parameters:
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/slug"
        - name: stageNumber
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: GPX 1.0 route file
          content:
            application/gpx+xml:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    year:
      name: year
      in: path
      required: true
      schema:
        type: integer
        example: 2026
    slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        example: giro-d-italia
    stageNumber:
      name: stageNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Stage number (1-based)

  responses:
    NotFound:
      description: Resource not found

  schemas:
    RaceIndex:
      type: object
      required: [updatedAt, races]
      properties:
        updatedAt:
          type: string
          format: date
          example: "2026-06-23"
        races:
          type: array
          items:
            $ref: "#/components/schemas/Race"

    Race:
      type: object
      required:
        - year
        - slug
        - name
        - path
        - status
        - startDate
        - endDate
        - country
        - edition
        - raceCategory
        - distanceKm
        - startLocation
        - finishLocation
      properties:
        year:
          type: integer
          example: 2026
        slug:
          type: string
          example: giro-d-italia
        name:
          type: string
          example: Giro d'Italia
        path:
          type: string
          description: Relative path under `data/`
          example: 2026/giro-d-italia
        status:
          type: string
          enum: [upcoming, live, finished]
        startDate:
          type: string
          format: date
          description: First race day (ISO date)
          example: "2026-05-08"
        endDate:
          type: string
          format: date
          description: Last race day (ISO date)
          example: "2026-05-31"
        country:
          type: string
          description: Host country (English name)
          example: Italy
        edition:
          type: integer
          minimum: 1
          description: Edition number (e.g. 109th Giro)
          example: 109
        raceCategory:
          type: string
          enum: [men, women]
          description: Elite gender classification
        distanceKm:
          type: number
          description: Total race distance in km (sum of stage distances for stage races)
          example: 3459.2
        startLocation:
          type: string
          description: Race start town (first stage start for stage races)
          example: Nessebar
        finishLocation:
          type: string
          description: Race finish town (last stage finish for stage races)
          example: Rome
        startTime:
          type: string
          format: date-time
          description: Optional UTC ISO-8601 instant for race or stage-1 start
        currentStage:
          type: string
          description: Optional human-readable race status line for detail headers
        gpxAttribution:
          type: string
          description: Optional map/GPX credit line for clients
        startlistNotes:
          type: string
          description: Optional startlist caveats (sources, scratches, placeholder bibs)

    Stage:
      type: object
      required:
        - id
        - number
        - name
        - date
        - distanceKm
        - startLocation
        - finishLocation
        - currentStage
        - status
        - gpxUrl
        - startTime
        - expectedFinishTime
      properties:
        id:
          type: string
          example: stage-1
        number:
          type: integer
          minimum: 1
        name:
          type: string
          example: Nessebar — Burgas
        date:
          type: string
          format: date
        startTime:
          type: string
          format: date-time
          description: Official stage start (ISO-8601 with offset)
          example: "2026-05-08T12:15:00+03:00"
        expectedFinishTime:
          type: string
          format: date-time
          description: Estimated finish from start + distance + stage type (see skills/expected-finish-time.md)
          example: "2026-05-08T16:03:00+03:00"
        distanceKm:
          type: integer
        startLocation:
          type: string
        finishLocation:
          type: string
        currentStage:
          type: string
        status:
          type: string
          enum: [upcoming, live, finished]
        gpxUrl:
          type: string
          format: uri-reference
          example: /data/2026/giro-d-italia/gpx/stage-1-route.gpx
        tvLink:
          type: string
          format: uri
          description: Optional external live stream or VOD URL (e.g. Discovery+ German commentary)

    Team:
      type: object
      required: [name, uciCategory, riders]
      properties:
        name:
          type: string
        uciCategory:
          type: string
          enum: [WT, PRT, CT]
        riders:
          type: array
          items:
            $ref: "#/components/schemas/Rider"

    Rider:
      type: object
      required: [bib, name, nationality]
      properties:
        bib:
          type: integer
        name:
          type: string
        nationality:
          type: string

    RiderResult:
      type: object
      required: [rank, bib, name, nationality, team, time]
      properties:
        rank:
          type: integer
          minimum: 1
          maximum: 25
        bib:
          type: integer
        name:
          type: string
        nationality:
          type: string
        team:
          type: string
        time:
          type: string
          description: Winner clock time, `s.t.`, or gap like `+0:27`
          example: "3:21:08"

    Results:
      type: object
      required: [provisionalGc, stageResults]
      properties:
        provisionalGc:
          type: array
          items:
            $ref: "#/components/schemas/RiderResult"
        stageResults:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/RiderResult"
          example:
            stage-1:
              - rank: 1
                bib: 11
                name: Example Rider
                nationality: Italy
                team: Example Team
                time: "3:21:08"

    Classification:
      type: object
      required: [kind, metric]
      properties:
        kind:
          type: string
          enum: [gc, points, kom, youth]
          description: Stable classification identifier (shared across all races)
        metric:
          type: string
          enum: [time, points]
          description: >-
            `time` for time-based classifications (gc, youth); `points` for
            points-based classifications (points, kom). Drives the value column.
        jerseyColor:
          type: string
          description: Hex color of the leader's jersey (race-specific)
          example: "#FFDD00"
        jerseyStyle:
          type: string
          description: Optional jersey pattern, e.g. `polka` for the mountains jersey
          example: polka
        jerseyName:
          type: string
          description: Optional official jersey name
          example: Maillot Jaune

    ClassificationPointsResult:
      type: object
      required: [rank, bib, name, nationality, team, points]
      properties:
        rank:
          type: integer
          minimum: 1
          maximum: 25
        bib:
          type: integer
        name:
          type: string
        nationality:
          type: string
        team:
          type: string
        points:
          type: integer
          minimum: 0
          description: Total classification points
          example: 44

    RouteFeature:
      type: object
      required: [id, name, kind, distanceKm]
      properties:
        id:
          type: string
          description: e.g. `stage-1-climb-1`, `stage-1-sprint-1`, `stage-1-cobble-1`
        name:
          type: string
        kind:
          type: string
          enum: [climb, sprint, cobble]
        distanceKm:
          type: number
          description: Kilometres from stage start to the feature
        category:
          type: integer
          minimum: 1
          maximum: 4
          description: UCI climb category (1 hardest – 4); required for `kind: climb`, omit for sprint/cobble
